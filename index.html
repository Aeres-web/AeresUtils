<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AERES UTILITY</title>

<style>
/* ===== GLOBAL ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
  overflow: hidden;
}

/* ===== CONTAINER ===== */
.container {
  text-align: center;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  width: 90%;
  max-width: 500px;
}

/* ===== TITLE ===== */
h1 {
  font-size: 2.5rem;
  letter-spacing: 4px;
  margin-bottom: 10px;
  background: linear-gradient(90deg, #00ffe7, #7a5cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===== SUBTEXT ===== */
p {
  opacity: 0.7;
  margin-bottom: 30px;
}

/* ===== BUTTON ===== */
button {
  padding: 15px 25px;
  font-size: 1rem;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(135deg, #7a5cff, #00ffe7);
  color: black;
  font-weight: bold;
  transition: 0.3s ease;
  box-shadow: 0 0 15px rgba(122, 92, 255, 0.4);
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(0, 255, 231, 0.7);
}

button:active {
  transform: scale(0.95);
}

/* ===== FOOTER TEXT ===== */
.small {
  margin-top: 20px;
  font-size: 0.8rem;
  opacity: 0.5;
}
</style>

</head>
<body>

<div class="container">
  <h1>AERES UTILITY</h1>
  <p>A sleek utility hub (totally not doing anything yet 👀)</p>

  <button onclick="uselessAction()">Useless Button</button>

  <div class="small" id="status">Status: idle</div>
</div>

<script>
function uselessAction() {
  const status = document.getElementById("status");

  const messages = [
    "Nothing happened.",
    "Still nothing.",
    "Why are you clicking this?",
    "Ok fine... it's still useless.",
    "You unlocked: absolutely nothing.",
    "AERES is judging you."
  ];

  const random = messages[Math.floor(Math.random() * messages.length)];
  status.innerText = "Status: " + random;
}
</script>

</body>
</html>
