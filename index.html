<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AERES UTILITY</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color: white;
}

.container {
  text-align: center;
  padding: 40px;
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 35px rgba(0,0,0,0.6);
  width: 90%;
  max-width: 500px;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
  background: linear-gradient(90deg, #00ffe7, #7a5cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
}

p {
  opacity: 0.7;
  margin-bottom: 25px;
}

button {
  padding: 15px 25px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 1rem;
  font-weight: bold;
  background: linear-gradient(135deg, #7a5cff, #00ffe7);
  color: black;
  transition: 0.25s ease;
  box-shadow: 0 0 15px rgba(122, 92, 255, 0.4);
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(0, 255, 231, 0.7);
}

button:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div class="container">
  <h1>AERES UTILITY</h1>
  <p>Download your utility package</p>

  <button onclick="downloadFile()">Download</button>
</div>

<script>
function downloadFile() {
  window.location.href =
    "https://raw.githubusercontent.com/Aeres-web/AeresUtils-dwd/main/AERESUTILS-compressed.zip";
}
</script>

</body>
</html>
